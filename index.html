<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>超市送貨管理系統</title>
  <style>
:root {
  --bg: #f3f6fb;
  --card: #ffffff;
  --text: #172033;
  --muted: #6b7890;
  --line: #dce4ef;
  --primary: #2563eb;
  --primary-dark: #1d4ed8;
  --primary-deep: #173a8a;
  --primary-soft: #eaf1ff;
  --primary-pale: #f5f8ff;
  --danger: #dc2626;
  --danger-soft: #fff0f0;
  --shadow: 0 16px 40px rgba(38, 68, 120, .10);
}

* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  margin: 0;
  font-family: "Segoe UI", "Microsoft JhengHei", Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}
button, input { font: inherit; }
button { -webkit-tap-highlight-color: transparent; }

.hero {
  position: relative;
  overflow: hidden;
  background: linear-gradient(135deg, #173a8a 0%, #2563eb 58%, #3b82f6 100%);
  color: white;
  padding: 34px 0 38px;
  box-shadow: 0 10px 30px rgba(29, 78, 216, .18);
}
.hero::before,
.hero::after {
  content: "";
  position: absolute;
  border-radius: 999px;
  background: rgba(255,255,255,.09);
}
.hero::before { width: 280px; height: 280px; right: 7%; top: -150px; }
.hero::after { width: 170px; height: 170px; right: 22%; bottom: -125px; }
.hero-inner, .container { width: min(1240px, calc(100% - 40px)); margin: auto; }
.hero-inner { position: relative; z-index: 1; }
.hero h1 {
  margin: 7px 0 9px;
  font-size: clamp(30px, 4vw, 46px);
  letter-spacing: .02em;
}
.hero p:last-child { margin: 0; opacity: .9; font-weight: 600; }
.eyebrow { margin: 0; font-size: 40px; font-weight: 900; letter-spacing: .14em; opacity: .82; }
.eyebrow.dark { color: var(--primary); opacity: 1; }

.container { padding: 26px 0 56px; }
.tabs {
    display: grid;
    grid-template-columns: repeat(4,1fr);
  gap: 8px;
  padding: 7px;
  background: #e6ecf5;
  border: 1px solid #d8e1ee;
  border-radius: 16px;
  margin-bottom: 26px;
  box-shadow: 0 8px 24px rgba(42, 62, 95, .05);
}
.tab {
  border: 0;
  padding: 14px 18px;
  border-radius: 11px;
  color: #52627a;
  font-weight: 900;
  background: transparent;
  cursor: pointer;
  transition: .2s ease;
}
.tab:hover { color: var(--primary); background: rgba(255,255,255,.55); }
.tab.active {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white;
  box-shadow: 0 9px 22px rgba(37, 99, 235, .24);
}
.panel { display: none; }
.panel.active { display: block; animation: fadeIn .22s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

.section-heading { display: flex; justify-content: space-between; align-items: end; margin-bottom: 16px; }
.section-heading h2 { margin: 5px 0 0; font-size: 26px; }
.section-heading.compact { margin-bottom: 18px; }
.subtext, .card-heading p { color: var(--muted); margin: 7px 0 0; line-height: 1.65; }
.notice {
  padding: 15px 17px;
  margin-bottom: 18px;
  background: var(--primary-soft);
  border: 1px solid #cbdcff;
  border-left: 4px solid var(--primary);
  border-radius: 12px;
  line-height: 1.65;
  color: #264169;
}

.table-shell {
  overflow: auto;
  max-height: 70vh;
  background: white;
  border: 1px solid var(--line);
  border-radius: 17px;
  box-shadow: var(--shadow);
  position: relative;
}
.schedule-table { width: 100%; min-width: 900px; border-collapse: collapse; }
.schedule-table th, .schedule-table td {
  border-right: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  padding: 15px;
  vertical-align: top;
}
.schedule-table th:last-child, .schedule-table td:last-child { border-right: 0; }
.schedule-table tr:last-child td { border-bottom: 0; }
.schedule-table thead th {
  background: linear-gradient(135deg, var(--primary-deep), var(--primary));
  color: white;
  text-align: center;
  font-size: 15px;
  letter-spacing: .02em;
}
.schedule-table tbody tr:hover td:not(.closed) { background: #fbfdff; }
.day-cell {
  width: 126px;
  text-align: center;
  vertical-align: middle !important;
  font-weight: 900;
  background: #f7f9fd;
  color: #26354d;
}

.schedule-table thead th{
    position:sticky;
    top:0;
    z-index:20;
}

.schedule-table thead th:first-child{
    left:0;
    z-index:30;
    background:var(--primary-deep);
}

  .schedule-table thead th.morning-header{
    left:126px;
    z-index:25;
    background:#87CEEB !important;
    color:#0f3d5c !important;
}

.schedule-table thead th.afternoon-header{
    left:calc(126px + 50%);
    z-index:25;
    background:#FFE58F !important;
    color:#7a4b00 !important;
}

.schedule-table .day-cell {
  position: sticky;
  left: 0;
  z-index: 4;
  background: #f7f9fd;
  box-shadow: 2px 0 0 var(--line);
}

.schedule-table tr:hover .day-cell {
  background: #f7f9fd;
}

.slot{
    min-height:100px;
}

.slot.morning{
    background:#EAF8FF;
}

.slot.afternoon{
    background:#FFF6CC;
}
    
.delivery {
  display: grid;
  grid-template-columns: 32px 1fr;
  gap: 11px;
  padding: 11px 0;
  border-bottom: 1px dashed var(--line);
}
.delivery:last-child { border-bottom: 0; }
.delivery-number {
  width: 30px;
  height: 30px;
  border-radius: 10px;
  display: grid;
  place-items: center;
  background: var(--primary-soft);
  color: var(--primary-dark);
  border: 1px solid #cbdcff;
  font-size: 12px;
  font-weight: 900;
}
.delivery strong, .delivery span, .delivery small { display: block; }
.delivery strong { color: #173a8a; }
.delivery span { margin-top: 3px; }
.delivery small { margin-top: 5px; color: var(--muted); }
.empty { color: #98a3b5; text-align: center; padding: 28px 8px; }
.closed {
  background: #eef2f7;
  color: #8793a6;
  text-align: center;
  vertical-align: middle !important;
  font-weight: 900;
}

.stats-section {
  margin-top: 25px;
  padding: 23px;
  background: white;
  border: 1px solid var(--line);
  border-radius: 17px;
  box-shadow: var(--shadow);
}
.stats-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 15px; }
.stat-card {
  position: relative;
  overflow: hidden;
  padding: 21px;
  border: 1px solid #dce6f7;
  border-radius: 15px;
  background: linear-gradient(145deg, #ffffff, var(--primary-pale));
  transition: .2s ease;
}
.stat-card::after {
  content: "";
  position: absolute;
  width: 74px;
  height: 74px;
  border-radius: 50%;
  right: -25px;
  top: -25px;
  background: rgba(37,99,235,.08);
}
.stat-card:hover { transform: translateY(-2px); box-shadow: 0 12px 26px rgba(37,99,235,.10); }
.stat-card span { display: block; color: #34445e; font-weight: 900; }
.stat-card strong { display: block; font-size: 42px; line-height: 1; margin: 12px 0 9px; color: var(--primary-dark); }
.stat-card small { color: var(--muted); }

.date-details {
  margin-top: 15px;
  border-top: 1px solid #dce6f7;
  padding-top: 12px;
}

.date-details summary {
  cursor: pointer;
  color: var(--primary-dark);
  font-weight: 900;
  list-style: none;
  user-select: none;
}

.date-details summary::-webkit-details-marker {
  display: none;
}

.date-details summary::after {
  content: "⌄";
  float: right;
  font-size: 18px;
  transition: transform .2s ease;
}

.date-details[open] summary::after {
  transform: rotate(180deg);
}

.date-list {
  display: grid;
  gap: 8px;
  margin-top: 12px;
}

.date-item {
  padding: 10px 11px;
  background: white;
  border: 1px solid #dce6f7;
  border-radius: 10px;
}

.date-item b,
.date-item span,
.date-item small {
  display: block;
}

.date-item b {
  color: #173a8a;
  font-size: 14px;
}

.date-item span {
  margin-top: 4px;
  color: #52627a;
  font-size: 13px;
}

.date-item small {
  margin-top: 4px;
  color: var(--muted);
}

.no-date {
  color: #98a3b5;
  font-size: 13px;
  padding: 6px 0;
}

.card {
  background: white;
  border: 1px solid var(--line);
  border-radius: 17px;
  box-shadow: var(--shadow);
  padding: 22px;
  margin-bottom: 20px;
}
.card-heading { display: flex; justify-content: space-between; gap: 18px; align-items: center; margin-bottom: 18px; }
.card-heading h3 { margin: 0; font-size: 21px; }
.button {
  border: 0;
  border-radius: 11px;
  padding: 11px 16px;
  font-weight: 900;
  cursor: pointer;
  transition: .18s ease;
}
.button:hover { transform: translateY(-1px); }
.button.primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; box-shadow: 0 8px 18px rgba(37,99,235,.22); }
.button.secondary { background: var(--primary-soft); color: var(--primary-dark); border: 1px solid #cbdcff; }
.button.danger { background: var(--danger); color: white; }

.store-labels, .store-row {
  display: grid;
  grid-template-columns: 1fr 92px;
  gap: 10px;
}
.store-labels { color: var(--muted); font-size: 12px; font-weight: 900; padding: 0 4px 8px; }
.store-list { display: grid; gap: 10px; }
.store-row { padding: 10px; border: 1px solid #e2e8f2; background: #fafcff; border-radius: 12px; }
.store-row input,
.edit-row input,
.edit-row select {
  width: 100%;
  padding: 12px 13px;
  border: 1px solid #cbd5e1;
  border-radius: 10px;
  outline: none;
  background: #fff;
  color: var(--text);
  transition: .18s ease;
}
.store-row input:focus,
.edit-row input:focus,
.edit-row select:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 4px rgba(37,99,235,.11);
}

.edit-row select {
  width: 100%;
  padding: 12px 13px;
  border: 1px solid #cbd5e1;
  border-radius: 10px;
  outline: none;
  background: #fff;
  color: var(--text);
}

.admin-day { margin-bottom: 16px; border: 1px solid var(--line); border-radius: 14px; overflow: hidden; background: #fff; }
.admin-day-title {
  padding: 14px 17px;
  background: linear-gradient(135deg, var(--primary-deep), var(--primary));
  color: white;
  font-weight: 900;
}
.admin-period { padding: 16px; border-top: 1px solid var(--line); }
.admin-period:first-of-type { border-top: 0; }
.period-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.period-head strong { font-size: 17px; color: #26354d; }
.edit-list { display: grid; gap: 10px; }
.edit-row {
  display: grid;
  grid-template-columns: 1.5fr 1.3fr 1fr 44px;
  gap: 10px;
  padding: 12px;
  align-items: end;
  background: #f8faff;
  border: 1px solid #dfe7f3;
  border-radius: 12px;
}
.field label { display: block; font-size: 12px; color: var(--muted); font-weight: 900; margin-bottom: 6px; }
.remove {
  height: 44px;
  border: 0;
  border-radius: 10px;
  background: var(--danger-soft);
  color: var(--danger);
  font-size: 20px;
  font-weight: 900;
  cursor: pointer;
}
.savebar {
  position: sticky;
  bottom: 12px;
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  padding: 12px;
  margin-top: 18px;
  background: rgba(255,255,255,.94);
  border: 1px solid var(--line);
  border-radius: 14px;
  backdrop-filter: blur(10px);
  box-shadow: var(--shadow);
}
.toast {
  position: fixed;
  right: 22px;
  bottom: 22px;
  padding: 13px 17px;
  color: white;
  background: #172033;
  border-radius: 11px;
  opacity: 0;
  transform: translateY(10px);
  pointer-events: none;
  transition: .2s;
  box-shadow: 0 12px 30px rgba(0,0,0,.18);
}
.toast.show { opacity: 1; transform: none; }

    .morning-header{
    background:#87CEEB !important;
    color:#0f3d5c !important;
}

.afternoon-header{
    background:#FFE58F !important;
    color:#7a4b00 !important;
}

@media (max-width: 900px) {
  .stats-grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
  .edit-row { grid-template-columns: 1fr 1fr; }
  .edit-row .note-field { grid-column: 1 / -1; }
  .remove { width: 100%; }
}
@media (max-width: 620px) {
  .hero-inner,
  .container {
    width: calc(100% - 12px);
  }

  .hero {
    padding: 18px 0 20px;
  }

  .hero h1 {
    font-size: 25px;
  }

  .hero p:last-child {
    font-size: 12px;
  }

  .container {
    padding: 14px 0 30px;
  }

  .tabs {
    gap: 4px;
    padding: 4px;
    margin-bottom: 14px;
    border-radius: 11px;
  }

  .tab {
    padding: 10px 4px;
    font-size: 13px;
  }

  .section-heading {
    margin-bottom: 10px;
  }

  .section-heading h2 {
    font-size: 20px;
  }

  .notice {
    padding: 10px;
    font-size: 13px;
    margin-bottom: 12px;
  }

  .card,
  .stats-section {
    padding: 12px;
    border-radius: 12px;
  }

  .stats-grid {
    grid-template-columns: 1fr;
    gap: 10px;
  }

  .stat-card {
    padding: 15px;
  }

  .stat-card strong {
    font-size: 32px;
  }

  .card-heading {
    align-items: stretch;
    flex-direction: column;
    gap: 10px;
  }

  .store-labels {
    display: none;
  }

  .store-row,
  .edit-row {
    grid-template-columns: 1fr;
  }

  .edit-row .note-field {
    grid-column: auto;
  }

  .admin-period {
    padding: 10px;
  }

  .admin-day-title {
    padding: 11px 13px;
  }

  .savebar {
    flex-direction: column;
  }

  .button {
    width: 100%;
  }

  .schedule-table {
    min-width: 700px;
  }

  .schedule-table th,
  .schedule-table td {
    padding: 10px;
    font-size: 13px;
  }

  .day-cell {
    width: 76px;
    min-width: 76px;
  }
}

</style>
</head>

function createId(prefix = "id") {
  return `${prefix}-${Date.now()}-${Math.random().toString(16).slice(2)}`;
}

function escapeHtml(value = "") {
  return String(value).replace(/[&<>"']/g, char => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    '"': "&quot;",
    "'": "&#039;"
  })[char]);
}


/* 日期格式函數放在這裡 */
function getCurrentWeekDate(dayName) {
  const dayIndexes = {
    "星期一": 0,
    "星期二": 1,
    "星期三": 2,
    "星期四": 3,
    "星期五": 4,
    "星期六": 5,
    "星期日": 6
  };

  const targetIndex = dayIndexes[dayName];

  if (targetIndex === undefined) {
    return dayName;
  }

  const today = new Date();

  // JavaScript：星期日為 0，星期一為 1
  const todayIndex = today.getDay() === 0
    ? 6
    : today.getDay() - 1;

  const monday = new Date(today);

  monday.setHours(0, 0, 0, 0);

  monday.setDate(
    today.getDate() - todayIndex
  );

  const targetDate = new Date(monday);

  targetDate.setDate(
    monday.getDate() + targetIndex
  );

  const day = String(
    targetDate.getDate()
  ).padStart(2, "0");

  const month = String(
    targetDate.getMonth() + 1
  ).padStart(2, "0");

  const year = targetDate.getFullYear();

  return `${day}/${month}/${year} ${dayName}`;
}


function normalizeData(raw) {
  const stores = Array.isArray(raw?.stores) ? raw.stores.map(item => ({
    id: item.id || createId("store"),
    supermarket: String(item.supermarket || "").trim(), 
  })) : [];

  const deliveries = Array.isArray(raw?.deliveries)
    ? raw.deliveries.map(item => ({
        id: item.id || createId("delivery"),
        day: item.day || "星期一",
        period: item.period || "早上",
        supermarket: String(item.supermarket || "").trim(),
        driver: String(item.driver || "").trim(),
note: String(item.note || "").trim()
    }))
    : [];

  return { stores, deliveries };
}

      .from("delivery_data")
      .select("id, data, created_at")
      .order("created_at", { ascending: false })
      .limit(1);

    if (error) throw error;

    if (rows && rows.length > 0) {
      cloudRowId = rows[0].id;
      data = normalizeData(rows[0].data);
    } else {
      data = structuredClone(defaultData);
    }

  } catch (error) {
    console.error("Supabase 讀取失敗：", error);

    const local = localStorage.getItem(STORAGE_KEY);

    data = local
      ? normalizeData(JSON.parse(local))
      : structuredClone(defaultData);
  }

  loadData();
}

async function saveData() {
  try {
    let result;

    if (cloudRowId) {
      result = await supabaseClient
        .from("delivery_data")
        .update({ data })
        .eq("id", cloudRowId);
    } else {
      result = await supabaseClient
        .from("delivery_data")
        .insert({ data })
        .select("id")
        .single();

      if (!result.error) {
        cloudRowId = result.data.id;
      }
    }

    if (result.error) throw result.error;

    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    return true;

  } catch (error) {
    console.error("Supabase 儲存失敗：", error);
    showToast("雲端儲存失敗，請檢查權限。");
    return false;
  }
}

function getItems(day, period) {
  return data.deliveries.filter(item => item.day === day && item.period === period);
}

function renderDeliveryList(items) {
  if (!items.length) {
    return '<div class="empty">目前沒有安排</div>';
  }

  return items.map((item, index) => `
    <div class="delivery">
      <span class="delivery-number">${index + 1}</span>

      <div>
        <strong>
          店名：${escapeHtml(item.supermarket || "未填")}
        </strong>

        <span>
          司機：${escapeHtml(item.driver || "未填")}
        </span>

        ${
          item.note
            ? `<small>備註：${escapeHtml(item.note)}</small>`
            : ""
        }
      </div>
    </div>
  `).join("");
}

function renderSchedule() {
  let html = dayConfig.map(([day, periods]) => `
    <tr>
      <td class="day-cell">${day}</td>
     <td class="slot morning">
    ${renderDeliveryList(getItems(day, "早上"))}
</td>

<td class="slot afternoon ${periods.includes("下午") ? "" : "closed"}">
    ${periods.includes("下午")
        ? renderDeliveryList(getItems(day, "下午"))
        : "下午不送貨"}
</td>
    </tr>
  `).join("");

  html += `
    <tr>
      <td class="day-cell">星期日</td>
      <td class="closed" colspan="2">休息日・不上班</td>
    </tr>
  `;

  $("#scheduleBody").innerHTML = html;
}

function renderStatistics() {
  const weekdays = new Set([
    "星期一",
    "星期二",
    "星期三",
    "星期四",
    "星期五"
  ]);

  const records = {};

  data.deliveries.forEach(item => {
    const supermarket = item.supermarket.trim();

    if (!weekdays.has(item.day) || !supermarket) return;

    if (!records[supermarket]) {
      records[supermarket] = [];
    }

    records[supermarket].push(item);
  });

  const names = [...new Set([
    ...data.stores
      .map(item => item.supermarket.trim())
      .filter(Boolean),

    ...Object.keys(records)
  ])].sort((a, b) => {
    const countA = records[a]?.length || 0;
    const countB = records[b]?.length || 0;

    return countB - countA || a.localeCompare(b, "zh-Hant");
  });

  $("#autoStats").innerHTML = names.length
    ? names.map(name => {
       const dayOrder = {
  "星期一": 1,
  "星期二": 2,
  "星期三": 3,
  "星期四": 4,
  "星期五": 5,
  "星期六": 6
};

const items = [...(records[name] || [])].sort((a, b) => {
  return (dayOrder[a.day] || 99) - (dayOrder[b.day] || 99);
});

        return `
          <article class="stat-card">
            <span>${escapeHtml(name)}</span>

            <strong>${items.length}</strong>

            <small>星期一至星期五送貨次數</small>

            <details class="date-details">
              <summary>查看送貨日期</summary>

              <div class="date-list">
                ${
                  items.length
                    ? items.map(item => `
                        <div class="date-item">
                          <b>${escapeHtml(getCurrentWeekDate(item.day))}</b>

                          ${
                            item.period
                              ? `<span>${escapeHtml(item.period)}</span>`
                              : ""
                          }

                          ${
                            item.driver
                              ? `<small>司機：${escapeHtml(item.driver)}</small>`
                              : ""
                          }
                        </div>
                      `).join("")
                    : '<div class="no-date">目前沒有送貨記錄</div>'
                }
              </div>
            </details>
          </article>
        `;
      }).join("")
    : `
      <div class="empty" style="grid-column:1/-1">
        目前尚未建立超市資料
      </div>
    `;
}

function renderStoreOptions() {
  $("#storeOptions").innerHTML = data.stores
    .filter(item => item.supermarket)
    .map(item => `
<option value="${escapeHtml(item.supermarket)}"></option>
`)
.join("");
}

function renderStoreList() {

    if (!data.stores.length) {
        data.stores.push({
            id: createId("store"),
            supermarket: ""
        });
    }

    $("#storeList").innerHTML = data.stores.map(item => `
        <div class="store-row" data-store-id="${item.id}">
            <input
                data-field="supermarket"
                value="${escapeHtml(item.supermarket)}"
                placeholder="例如：Farley">

            <button
                class="button danger"
                data-action="delete-store">
                刪除
            </button>
        </div>
    `).join("");

    renderStoreOptions();
}

function renderDriverManager() {

  const drivers = [
    { name: "Ngembang", color: "#FFB8B8" },
    { name: "Lembang", color: "#E2E2E2" },
    { name: "Wisman", color: "#BEEEBE" },
    { name: "Patrick", color: "#B8DBFF" }
];

    $("#driverManager").innerHTML = drivers.map(driver => {

        const list = data.deliveries.filter(x => x.driver === driver.name);

        return `
        <div class="card" style="background:linear-gradient(180deg,#ffffff 0%,${driver.color} 100%);margin-bottom:20px;">

            <h3>${driver.name}</h3>

            ${list.map(item=>`

                <div class="edit-row">

                    <select
                        class="driver-supermarket"
                        data-id="${item.id}">

                        <option value="">請選擇超市</option>

                       ${data.stores
    .filter(store => store.supermarket && store.supermarket.trim())
    .map(store => `
        <option
            value="${escapeHtml(store.supermarket)}"
            ${item.supermarket === store.supermarket ? "selected" : ""}>
            ${escapeHtml(store.supermarket)}
        </option>
    `).join("")}

                    </select>

                    <input
                        class="driver-note"
                        data-id="${item.id}"
                        value="${item.note}"
                        placeholder="備註">

                    <button
                        class="remove delete-driver"
                        data-id="${item.id}">
                        ×
                    </button>

                </div>

            `).join("")}

            <button
                class="button secondary add-driver-store"
                data-driver="${driver.name}">
                ＋ 新增超市
            </button>

        </div>
        `;

    }).join("");

}

    $("#driverManager").addEventListener("click", e => {

    // 新增超市
    if (e.target.matches(".add-driver-store")) {

        data.deliveries.push({
            id: createId("delivery"),
            day: "星期一",
            period: "早上",
            driver: e.target.dataset.driver,
            supermarket: "",
            note: ""
        });

        renderDriverManager();
        return;
    }

    // 刪除
    if (e.target.matches(".delete-driver")) {

        data.deliveries = data.deliveries.filter(
            x => x.id !== e.target.dataset.id
        );

        renderDriverManager();
        return;
    }

});

    $("#driverManager").addEventListener("change", e => {

    if (!e.target.matches(".driver-supermarket")) return;

    const item = data.deliveries.find(
        x => x.id === e.target.dataset.id
    );

    if (!item) return;

    item.supermarket = e.target.value;

});

    $("#driverManager").addEventListener("input", e => {

    if (!e.target.matches(".driver-note")) return;

    const item = data.deliveries.find(
        x => x.id === e.target.dataset.id
    );

    if (!item) return;

    item.note = e.target.value;

});
    
function collectStoreEdits() {
  document.querySelectorAll("[data-store-id]").forEach(row => {
    const item = data.stores.find(
      store => store.id === row.dataset.storeId
    );

    if (!item) return;

    item.supermarket = row
.querySelector('[data-field="supermarket"]')
.value
.trim();
  });
}


function renderAll() {
    renderSchedule();
    renderStatistics();
    renderStoreList();
    renderDriverManager();
}

function switchTab(tabName) {
  document.querySelectorAll(".tab").forEach(button => button.classList.toggle("active", button.dataset.tab === tabName));
  document.querySelectorAll(".panel").forEach(panel => panel.classList.toggle("active", panel.id === tabName));
}

function showToast(message) {
  const toast = $("#toast");
  toast.textContent = message;
  toast.classList.add("show");
  clearTimeout(showToast.timer);
  showToast.timer = setTimeout(() => toast.classList.remove("show"), 2200);
}

document.querySelectorAll(".tab").forEach(button => {
  button.addEventListener("click", () => switchTab(button.dataset.tab));
});

$("#addStore").addEventListener("click", () => {
  collectStoreEdits();
    data.stores.push({
        id: createId("store"),
        supermarket: ""
    });
  renderStoreList();
  const inputs = document.querySelectorAll('[data-field="supermarket"]');
  inputs[inputs.length - 1]?.focus();
});

$("#saveStores").addEventListener("click", async () => {
  collectStoreEdits();

  data.stores = data.stores.filter(item =>
    item.supermarket.trim()
  );

const saved = await saveData();
if (!saved) return;
  
  renderStoreList();
  renderStatistics();
  renderDriverManager();

  showToast("超市清單已儲存。");
});

$("#storeList").addEventListener("click", event => {
  const button = event.target.closest('[data-action="delete-store"]');
  if (!button) return;
  const row = button.closest("[data-store-id]");
  data.stores = data.stores.filter(item => item.id !== row.dataset.storeId);
  renderStoreList();
});


$("#save").addEventListener("click", async () => {
  collectStoreEdits();
  data.stores = data.stores.filter(item => item.supermarket);
  data.deliveries = data.deliveries.filter(
    item =>
      item.supermarket ||
      item.driver ||
      item.note
  );
  renderSchedule();
  renderStatistics();
  const saved = await saveData();
if (!saved) return;
  renderAll();
  switchTab("schedule");
  showToast("送貨安排已儲存，統計已自動更新。");
});

$("#reset").addEventListener("click", async () => {
  if (!confirm("確定要清除所有超市及送貨安排嗎？")) return;
  data = structuredClone(defaultData);
  const saved = await saveData();
if (!saved) return;
  renderAll();
  showToast("資料已重設。");
});

renderAll();

</script>
 
</body>
</html>
